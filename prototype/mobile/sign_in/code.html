<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#eaf1ff",
                        "inverse-surface": "#213145",
                        "surface-variant": "#d3e4fe",
                        "surface": "#f8f9ff",
                        "on-primary-container": "#eeefff",
                        "outline-variant": "#c3c6d7",
                        "on-secondary-fixed-variant": "#005236",
                        "primary-fixed-dim": "#b4c5ff",
                        "inverse-primary": "#b4c5ff",
                        "surface-container-high": "#dce9ff",
                        "error-container": "#ffdad6",
                        "surface-tint": "#0053db",
                        "surface-container-low": "#eff4ff",
                        "on-surface": "#0b1c30",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#ffb95f",
                        "tertiary-container": "#996100",
                        "secondary-container": "#6cf8bb",
                        "on-error-container": "#93000a",
                        "tertiary": "#784b00",
                        "on-primary-fixed": "#00174b",
                        "on-secondary-container": "#00714d",
                        "surface-container-highest": "#d3e4fe",
                        "on-tertiary-fixed": "#2a1700",
                        "surface-bright": "#f8f9ff",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-secondary": "#ffffff",
                        "on-background": "#0b1c30",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary": "#006c49",
                        "primary-container": "#2563eb",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary": "#ffffff",
                        "outline": "#737686",
                        "surface-container": "#e5eeff",
                        "surface-dim": "#cbdbf5",
                        "on-surface-variant": "#434655",
                        "on-secondary-fixed": "#002113",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-fixed": "#ffddb8",
                        "background": "#f8f9ff",
                        "secondary-fixed-dim": "#4edea3",
                        "primary": "#004ac6",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary-container": "#ffeedd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "24px",
                        "stack-lg": "48px",
                        "gutter": "16px",
                        "container-margin": "20px",
                        "stack-sm": "12px",
                        "base": "8px"
                    },
                    "fontSize": {
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Auth Navigation Suppression - Per Shell Logic, top bar is minimal/hidden for transactional pages -->
<header class="fixed top-0 left-0 w-full flex items-center px-5 h-16 z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
</header>
<main class="flex-grow flex items-center justify-center px-container-margin py-stack-lg mt-16">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-stack-lg text-center">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-2xl mb-stack-md shadow-[0_8px_30px_rgb(37,99,235,0.2)]">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" style="font-variation-settings: 'FILL' 1;">nest_multi_room</span>
</div>
<h1 class="text-headline-lg font-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Sign in to find your perfect student home.</p>
</div>
<!-- Sign In Card -->
<div class="w-full bg-surface-container-lowest p-gutter rounded-3xl shadow-[0_4px_20px_-4px_rgba(37,99,235,0.06)] border border-surface-container-high">
<form class="space-y-gutter">
<!-- Email Field -->
<div class="space-y-base">
<label class="text-label-md font-label-md text-on-surface-variant block ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-2 border-transparent rounded-2xl text-on-surface placeholder:text-outline focus:border-primary-container focus:bg-white focus:ring-0 transition-all duration-200 outline-none" id="email" placeholder="student@kibabii.ac.ke" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center ml-1">
<label class="text-label-md font-label-md text-on-surface-variant block" for="password">Password</label>
<a class="text-caption font-caption text-primary-container hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-low border-2 border-transparent rounded-2xl text-on-surface placeholder:text-outline focus:border-primary-container focus:bg-white focus:ring-0 transition-all duration-200 outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary-container text-on-primary-container text-label-md font-label-md rounded-2xl shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 mt-4" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[18px]">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-stack-md flex items-center">
<div class="flex-grow border-t border-surface-container-high"></div>
<span class="flex-shrink mx-4 text-caption font-caption text-outline">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-surface-container-high"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-stack-sm">
<button class="flex items-center justify-center gap-2 h-14 border border-surface-container-high rounded-2xl hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCijLldPiy6O_DUUNYKCaAsN_4L0pDrBXsAy-bh7o9LGd9qeGmywljNfJ_7GbuhO_1ZVycxuoIbGYaZ5B5sVbuBcWw0ldiB4_oxB3SstF1k07zd87rRgSQf5de4c9rn_3v591gHK-wJqHTHhp9jBrCNA6v-bpUvMC17vEDQdP9yIHJNctihK22TYZEvCkyixHPN94sG_JmCGfiWeFo43kp5Ecnj-tUrx-KbRt6QZxY239aOxMWye6DyBkTBVoHA1FLzdz4jl29Kz8U"/>
<span class="text-label-md font-label-md">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-14 border border-surface-container-high rounded-2xl hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-label-md font-label-md">Apple</span>
</button>
</div>
</div>
<!-- Footer Link -->
<p class="mt-stack-lg text-body-md font-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary-container font-bold hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</main>
<!-- Decoration Layer -->
<div class="fixed bottom-0 left-0 w-full h-1/2 -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary rounded-full blur-[100px] opacity-10"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary rounded-full blur-[100px] opacity-10"></div>
</div>
</body></html>
