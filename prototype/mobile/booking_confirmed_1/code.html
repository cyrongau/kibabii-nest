        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8f9ff;

    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex flex-col">
<!-- Top Navigation Shell -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-[#F8FAFC] dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800 shadow-sm dark:shadow-none">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_SANS'] font-bold text-lg text-on-background">Review Booking</h1>
</div>
<button class="flex items-center justify-center p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">help_outline</span>
</button>
</header>
<!-- Main Success Content -->
<main class="flex-grow pt-24 pb-32 px-container-margin container mx-auto max-w-lg">
<!-- Success Animation/Icon Area -->
<div class="flex flex-col items-center text-center mb-stack-lg">
<div class="relative w-32 h-32 mb-6">
<!-- Outer celebratory ring -->
<div class="absolute inset-0 rounded-full bg-secondary/10 animate-pulse"></div>
<!-- Main Checkmark Container -->
<div class="absolute inset-4 rounded-full bg-secondary flex items-center justify-center shadow-lg shadow-secondary/20">
<span class="material-symbols-outlined text-white text-6xl" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<!-- Decorative Floaters -->
<div class="absolute -top-2 -right-2 w-4 h-4 rounded-full bg-primary animate-bounce"></div>
<div class="absolute bottom-2 -left-4 w-6 h-6 rounded-full bg-tertiary-fixed-dim opacity-50"></div>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-background mb-stack-sm">Booking Confirmed!</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px]">
                Your stay at <span class="font-bold text-primary">The Azure Commons</span> is secured. We've sent the confirmation details to your email.
            </p>
</div>
<!-- Summary Card (Bento-style layout) -->
<div class="bg-surface-container-lowest border border-outline-variant/30 rounded-3xl p-6 shadow-[0_4px_24px_rgba(0,83,219,0.04)] mb-stack-lg overflow-hidden relative">
<!-- Background Decoration -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-bl-[100px] -mr-8 -mt-8"></div>
<div class="relative z-10">
<div class="flex items-center justify-between mb-8">
<div class="flex flex-col">
<span class="font-caption text-caption text-outline uppercase tracking-wider">Booking ID</span>
<span class="font-label-md text-headline-md text-on-background">#KN-88291</span>
</div>
<div class="h-12 w-12 bg-secondary/10 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">confirmation_number</span>
</div>
</div>
<div class="grid grid-cols-1 gap-6">
<div class="flex items-start gap-4 p-4 bg-surface-container-low rounded-2xl">
<div class="mt-1">
<span class="material-symbols-outlined text-primary">calendar_today</span>
</div>
<div>
<p class="font-caption text-caption text-outline">Check-in Date</p>
<p class="font-label-md text-on-background">Oct 12, 2024</p>
</div>
</div>
<div class="flex items-start gap-4 p-4 bg-surface-container-low rounded-2xl">
<div class="mt-1">
<span class="material-symbols-outlined text-primary">location_on</span>
</div>
<div>
<p class="font-caption text-caption text-outline">Address</p>
<p class="font-label-md text-on-background">University District, Metro City</p>
</div>
</div>
</div>
<!-- Subtle Map Preview -->
<div class="mt-6 h-32 w-full rounded-2xl overflow-hidden border border-outline-variant/20">
<img class="w-full h-full object-cover" data-alt="A clean, minimalist digital map interface showing a pinpoint location in a vibrant metropolitan university district. The map features a soft color palette of light blues and greys, with a prominent electric azure marker indicating the destination. The surrounding urban grid is simplified and elegant, suggesting a high-tech navigation experience for students. The lighting is bright and airy, reflecting a modern light-mode UI aesthetic." data-location="Metro City" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCshnC_oS8th9lsAE-9NGwjNZIN8oPY2DAI3gpfSCJVN7V_wfZq141fy8_E3goYOYqrfsS44frTgdQzLYcupUAaA0E0TC0A_jDiDyQARwcSNyrwjrbWstlavIESZQWONnJIu0jIWu5Vq_8NZIz3cd5wW1f75h5-MsAD6JBdQpS0RSS3f8YhDdKAa6_6u6vXNTkawBeAIl8NNVKZqqyueWUIWu6Ka-tu7Zou32m8DVqEL-naM98Y0M7DOU0fb4Yaf0-IXc_z7gj7L-E"/>
</div>
</div>
</div>
<!-- Action Cluster -->
<div class="flex flex-col gap-4">
<button class="w-full h-[56px] bg-primary text-white font-label-md rounded-2xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>View My Bookings</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<button class="w-full h-[56px] border-2 border-outline-variant text-on-surface-variant font-label-md rounded-2xl hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center">
                Back to Home
            </button>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed as per "Success/Confirmation" rule, but structure kept for reference if needed elsewhere) -->
<!-- Resulting UI prioritizes the confirmation content -->
<!-- Placeholder for success celebration confetti elements -->
<div class="fixed inset-0 pointer-events-none z-[60] overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-2 h-2 bg-primary rounded-full opacity-40"></div>
<div class="absolute top-1/3 right-10 w-3 h-3 bg-secondary rounded-full opacity-40"></div>
<div class="absolute bottom-1/2 left-8 w-2 h-2 bg-tertiary rounded-full opacity-40"></div>
</div>
