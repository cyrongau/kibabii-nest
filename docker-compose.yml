version: '3.8'

services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: kibabii-db
    restart: always
    environment:
      POSTGRES_USER: nestuser
      POSTGRES_PASSWORD: nestpassword
      POSTGRES_DB: kibabiinest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Backend (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kibabii-backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://nestuser:nestpassword@db:5432/kibabiinest?schema=public
      PORT: 9000
    ports:
      - "9000:9000"
    volumes:
      - ./backend/uploads:/app/uploads

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: kibabii-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://api.yourdomain.com
    ports:
      - "3000:3000"

volumes:
  postgres_data:
