services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: kibabii-db
    restart: always
    environment:
      POSTGRES_USER: nestuser
      POSTGRES_PASSWORD: nestpassword
      POSTGRES_DB: kibabiinest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Object Storage (MinIO)
  minio:
    image: minio/minio
    container_name: kibabii-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"

  # Backend (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kibabii-backend
    restart: always
    depends_on:
      - db
      - minio
    environment:
      DATABASE_URL: postgresql://nestuser:nestpassword@db:5432/kibabiinest?schema=public
      PORT: 9000
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: kibabii-nest
      S3_PUBLIC_URL: https://api.kibabii.generexcom.com/s3/kibabii-nest
    ports:
      - "9000:9000"
    volumes:
      - ./backend/uploads:/app/uploads

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: kibabii-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://api.kibabii.generexcom.com
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
